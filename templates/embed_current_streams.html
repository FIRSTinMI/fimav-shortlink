{{ template "layout.html" . }}
{{ define "content" }}
{{ range $event := .Events }}
{{ if .Name }}
<h1>{{ .Name }}</h1>
{{ end }}
{{ template "event_stream_embeds" $event  }}
{{ end }}

{{ if .FeedbackUrl -}}
<a href="{{ .FeedbackUrl }}">Report a problem</a>
{{- end }}
<script>
    window.parent.postMessage(document.body.scrollHeight + 10, "*");
</script>
{{ end }}
